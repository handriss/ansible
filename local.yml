- hosts: localhost
  connection: local
  gather_facts: true
  pre_tasks:
    - name: Check if running on macOS
      ansible.builtin.fail:
        msg: "This playbook only runs on macOS. Detected OS: {{ ansible_os_family }}"
      when: ansible_os_family != "Darwin"

    - name: Check if Homebrew is installed
      block:
        - name: Check if Homebrew is installed
          homebrew:
            update_homebrew: true
          check_mode: true
        - name: Homebrew available
          debug:
            msg: Homebrew is installed
      rescue:
        - name: No homebrew
          debug:
            msg: Homebrew is not installed

  tasks:
    - name: Install ssh keys
      ansible.builtin.import_tasks:
        file: tasks/ssh.yml

    - name: Setup terminal and shell
      ansible.builtin.import_tasks:
        file: tasks/terminal.yml

    - name: Setup git
      ansible.builtin.import_tasks:
        file: tasks/git.yml

    - name: Setup yabai and skhd
      ansible.builtin.import_tasks:
        file: tasks/yabai.yml

    - name: Setup Karabiner-Elements
      ansible.builtin.import_tasks:
        file: tasks/karabiner.yml

    - name: Setup nvm and Node.js
      ansible.builtin.import_tasks:
        file: tasks/nvm.yml

    - name: Setup pyenv and Python
      ansible.builtin.import_tasks:
        file: tasks/python.yml

    - name: Setup Go
      ansible.builtin.import_tasks:
        file: tasks/go.yml

    - name: Setup Bun
      ansible.builtin.import_tasks:
        file: tasks/bun.yml

    - name: Setup neovim
      ansible.builtin.import_tasks:
        file: tasks/neovim.yml

    - name: Setup Docker
      ansible.builtin.import_tasks:
        file: tasks/docker.yml

    - name: Setup tmux
      ansible.builtin.import_tasks:
        file: tasks/tmux.yml

    - name: Setup dev tools
      ansible.builtin.import_tasks:
        file: tasks/devtools.yml

    - name: Setup CodeRabbit CLI
      ansible.builtin.import_tasks:
        file: tasks/coderabbit.yml

    - name: Install CLI tools
      ansible.builtin.import_tasks:
        file: tasks/cli.yml

    - name: Install apps
      ansible.builtin.import_tasks:
        file: tasks/apps.yml

  post_tasks:
    - name: Manual installation reminder
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - ""
          - "  Playbook finished. A few things must be installed manually:"
          - ""
          - "  1. Xcode  -  open the App Store and search 'Xcode',"
          - "               or use this direct link:"
          - "               https://apps.apple.com/app/xcode/id497799835"
          - ""
          - "     After install, accept the license and install CLT:"
          - "       sudo xcodebuild -license accept"
          - "       xcode-select --install"
          - ""
          - "  2. Sign in to apps that need accounts:"
          - "     Tailscale, Claude, Telegram, Anki, Karabiner"
          - ""
          - "============================================================"
