- hosts: localhost
  connection: local
  gather_facts: true
  pre_tasks:
    - name: Check if running on macOS
      ansible.builtin.fail:
        msg: "This playbook only runs on macOS. Detected OS: {{ ansible_os_family }}"
      when: ansible_os_family != "Darwin"

    - name: Check if Homebrew is installed
      block:
        - name: Check if Homebrew is installed
          homebrew:
            update_homebrew: true
          check_mode: true
        - name: Homebrew available
          debug:
            msg: Homebrew is installed
      rescue:
        - name: No homebrew
          debug:
            msg: Homebrew is not installed

  tasks:
    - name: Install ssh keys
      ansible.builtin.import_tasks:
        file: tasks/ssh.yml
      tags: [ssh]

    - name: Install everything from Brewfile
      ansible.builtin.import_tasks:
        file: tasks/brewfile.yml
      tags: [brew]

    - name: Apply macOS system defaults
      ansible.builtin.import_tasks:
        file: tasks/macos.yml
      tags: [defaults, macos]

    - name: Setup terminal and shell
      ansible.builtin.import_tasks:
        file: tasks/terminal.yml
      tags: [config, terminal]

    - name: Setup git
      ansible.builtin.import_tasks:
        file: tasks/git.yml
      tags: [config, git]

    - name: Setup yabai and skhd
      ansible.builtin.import_tasks:
        file: tasks/yabai.yml
      tags: [config, services, yabai]

    - name: Setup Karabiner-Elements
      ansible.builtin.import_tasks:
        file: tasks/karabiner.yml
      tags: [config, karabiner]

    - name: Setup neovim
      ansible.builtin.import_tasks:
        file: tasks/neovim.yml
      tags: [config, neovim]

    - name: Setup tmux
      ansible.builtin.import_tasks:
        file: tasks/tmux.yml
      tags: [config, tmux]

    - name: Setup nvm and Node.js versions
      ansible.builtin.import_tasks:
        file: tasks/nvm.yml
      tags: [langs, nvm, node]

    - name: Setup pyenv and Python versions
      ansible.builtin.import_tasks:
        file: tasks/python.yml
      tags: [langs, python, pyenv]

    - name: Setup Go workspace
      ansible.builtin.import_tasks:
        file: tasks/go.yml
      tags: [langs, go]

    - name: Setup CodeRabbit CLI
      ansible.builtin.import_tasks:
        file: tasks/coderabbit.yml
      tags: [coderabbit]

  post_tasks:
    - name: Manual installation reminder
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - ""
          - "  Playbook finished. A few things must be installed manually:"
          - ""
          - "  1. Xcode  -  open the App Store and search 'Xcode',"
          - "               or use this direct link:"
          - "               https://apps.apple.com/app/xcode/id497799835"
          - ""
          - "     After install, accept the license and install CLT:"
          - "       sudo xcodebuild -license accept"
          - "       xcode-select --install"
          - ""
          - "  2. Sign in to apps that need accounts:"
          - "     Tailscale, Claude, Telegram, Anki, Karabiner"
          - ""
          - "  3. Grant Accessibility + Input Monitoring permissions to"
          - "     yabai, skhd, and Karabiner-Elements when macOS prompts"
          - "     (System Settings -> Privacy & Security)"
          - ""
          - "============================================================"
      tags: [always]
